name: anoxia
description: "A high-performance, real-time IM (Instant Messaging) solution built with Flutter and Dart. Supports low-latency message delivery and robust state synchronization."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev
version: 1.0.6

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # 屏幕适配
  flutter_screenutil: ^5.9.3
  # Riverpod核心库
  flutter_riverpod: ^3.0.3
  riverpod_annotation: ^3.0.3
  #http请求
  dio: ^5.9.0
  #路由
  go_router: ^17.0.0
  #Log库
  talker_flutter: ^5.1.5
  talker_riverpod_logger: ^5.1.5
  #本地存储
  shared_preferences: ^2.5.3
  # 密钥存储
  flutter_secure_storage: ^9.0.0
  #网络检测
  connectivity_plus: ^7.0.0
  # 权限申请（蓝牙耳机连接所需）
  permission_handler: ^11.3.1
  #国际化 多语言设置
  easy_localization: ^3.0.8
  #图标
  hugeicons: ^1.1.5
  #列表滚动
  flutter_list_view: ^1.1.29
  # 可定位列表滚动
  scrollable_positioned_list: ^0.3.8
  #rtc
  livekit_client: ^2.6.2
  flutter_webrtc: ^1.3.0
  #socket
  web_socket_channel: ^3.0.3
  #win toolbar
  tray_manager: ^0.5.2
  #富文本
  flutter_quill: ^11.5.0
  #图片缓存
  cached_network_image: ^3.4.1
  #图片查看
  photo_view: ^0.15.0
  window_manager:
    git:
      url: https://github.com/boyan01/window_manager.git
      path: packages/window_manager
      ref: 6fae92d21b4c80ce1b8f71c1190d7970cf722bd4
  #toast
  bot_toast: ^4.1.3
  #流传输
  #  flutter_client_sse: ^2.0.3
   #link 链接处理
  url_launcher: ^6.3.2
  #字母分组排序列表
  alphabet_list_view: ^1.2.0
  #汉字转拼音
  lpinyin: ^2.0.3
  # 多窗口
  desktop_multi_window: ^0.3.0
  #文件选择
  file_picker: ^11.0.2
  #uuid
  uuid: ^4.5.2
  # 程序信息检测
  package_info_plus: ^9.0.0
  # 获取文件目录
  path_provider: ^2.1.5
  # 打开文件
  open_filex: ^4.7.0
  # 版本比较
  pub_semver: ^2.2.0
  path: ^1.9.1
  characters: ^1.4.0
  #处理图片格式
  image: ^4.7.2
  #emoje
  emoji_picker_flutter: ^4.4.0
  #通知
  flutter_local_notifications: ^20.0.0
  flutter_new_badger: ^1.1.1
  #剪贴板
  pasteboard: ^0.4.0
  flutter_staggered_animations: ^1.1.1
    #卡片动画
  flutter_card_swiper: ^7.0.2
    #树形视图
  flutter_fancy_tree_view: ^1.6.0
  #拆分器视图插件
  split_view: ^3.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^3.0.3
  riverpod_lint: ^3.0.3
  build_runner: ^2.10.3
  flutter_gen_runner: ^5.12.0
  go_router_builder: ^4.1.3
  flutter_oss_licenses: ^3.2.0

flutter:
  uses-material-design: true
  assets:
    - assets/i18n/
    - assets/images/
  #     - images/a_dot_burr.jpeg
  #     - images/a_dot_ham.jpeg

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  fonts:
    - family: HarmonyOS
      fonts:
        - asset: assets/fonts/HarmonyOS.ttf